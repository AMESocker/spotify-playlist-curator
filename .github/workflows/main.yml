name: Spotify Playlist Cleanup
on:
  schedule:
    - cron: "0 10 * * *" # Runs every day at 10:00 UTC (~3 AM Pacific)
    - cron: "0 18 * * *" # Runs every day at 18:oo UTC (10 AM Pacific)
    - cron: "0 21 * * *" # Runs every day at 21:00 UTC (2 PM PDT / 1 PM PST)
  workflow_dispatch: # Allow manual trigger
permissions:
  contents: write 
jobs:
  run-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Run cleanup script
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          MONITORED_PLAYLISTS: ${{ secrets.MONITORED_PLAYLISTS }}
          ARCHIVE_PLAYLISTS: ${{ secrets.ARCHIVE_PLAYLISTS }}
          TARGET_PLAYLIST_ID: ${{ secrets.TARGET_PLAYLIST_ID }}
          RUN_MODE: once
        run: node index.js
      - name: Commit and push all changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json data/artistDisc.json data/sourceIndex.json data/1080albums.json data/rockNRollHallofFame.json data/editorsChoiceAlbums.json data/classicalMusic.json data/artistTop10.json
          git diff --staged --quiet || git commit -m "Update playlist state and data [skip ci]"
          git push
